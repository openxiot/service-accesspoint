name: Staging

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io/openxiot
  IMAGE_NAME: service-device-accesspoint
  RESOURCE_GROUP: staging
  CONTAINER_APP_NAME: service-device-accesspoint

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # 必须权限：允许推送 GHCR 容器镜像
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 升级为 GraalVM 25 官方发行版（支持 Native 编译）
      - name: Set up GraalVM 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'graalvm'
          package-type: jdk

      # Maven 编译 Native 可执行文件
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests -Dnative -Dquarkus.profile=stage

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 构建并推送镜像到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.native-micro
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 登录 Azure（保留原有部署逻辑）
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_OPENXIOT_STAGING_CREDENTIALS }}

      # 更新 Azure Container App 镜像
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --query properties.configuration.ingress.fqdn

      # 部署状态校验
      - name: Verify deployment
        run: |
          STATUS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.provisioningState -o tsv)

          if [ "$STATUS" != "Succeeded" ]; then
            echo "::error:: Deployment failed with status: $STATUS"
            exit 1
          fi