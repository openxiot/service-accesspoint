name: Production

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io/openxiot
  IMAGE_NAME: service-device-accesspoint
  RESOURCE_GROUP: production
  CONTAINER_APP_NAME: service-device-accesspoint

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # 必须权限：允许推送 GHCR 容器镜像
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 升级为 GraalVM 25 官方发行版（支持 Native 编译）
      - name: Set up GraalVM 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'graalvm'
          package-type: jdk

      # Maven 编译 Native 可执行文件
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests -Dnative -Dquarkus.profile=prod

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 构建并推送镜像到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.native-micro
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

