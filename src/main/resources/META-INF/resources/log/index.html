<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Server Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;
            color: #d4d4d4;
            font: 13px 'Menlo', 'Consolas', monospace;
        }

        #log {
            height: 100vh;
            overflow-y: auto;
            padding: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .INFO {
            color: #d4d4d4;
        }

        .WARN {
            color: #cca700;
        }

        .ERROR {
            color: #f44747;
        }

        .DEBUG {
            color: #608b4e;
        }
    </style>
</head>
<body>
<div id="log"></div>
<script>
    var el = document.getElementById('log');
    var evt = new EventSource('/log/stream');
    evt.onmessage = function (e) {
        el.textContent += e.data + '\n';
        el.scrollTop = el.scrollHeight;
    };
    evt.onerror = function () {
        el.textContent += '[disconnected]\n';
    };
</script>
</body>
</html>
