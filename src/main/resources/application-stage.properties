#------------------------------------------------------------
# LOG
#------------------------------------------------------------

# 注意：INFO/DEBUG 可能刷屏
quarkus.log.level=INFO

# 强制关闭控制台多余输出（非常重要）
quarkus.log.console.level=INFO

# 彻底关闭 HTTP 访问日志（避免再刷请求日志）
quarkus.http.access-log.enabled=false

#------------------------------------------------------------
# Product Center
#------------------------------------------------------------
product-center-api/mp-rest/url=http://service-product

#------------------------------------------------------------
# Event Service
#------------------------------------------------------------
device-event-api/mp-rest/url=http://service-event

#------------------------------------------------------------
# Console Service
#------------------------------------------------------------
console-api/mp-rest/url=http://service-console